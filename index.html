<!DOCTYPE html><html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Avenix Hub</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: linear-gradient(135deg, #0f172a, #1e293b);
      color: white;
      text-align: center;
    }

    h1 {
      margin-top: 40px;
    }

    button {
      padding: 12px 25px;
      font-size: 16px;
      border: none;
      border-radius: 8px;
      background: #22c55e;
      color: white;
      cursor: pointer;
      margin-top: 20px;
    }

    button:hover {
      opacity: 0.8;
    }

    #userData {
      margin-top: 30px;
    }
  </style></head><body><h1>⚡ AVENIX HUB</h1><button onclick="login()">Google Login</button>

<div id="userData"></div><!-- Firebase CDN (Stable Version) --><script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script><script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script><script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script><script>
try {

  // 🔥 Firebase Config (Tumhara)
  const firebaseConfig = {
    apiKey: "AIzaSyA-qXdBXHHZSIdf_462jQsP0n9GpDPIhJY",
    authDomain: "avenixhub.firebaseapp.com",
    projectId: "avenixhub"
  };

  // Initialize Firebase
  firebase.initializeApp(firebaseConfig);

  const auth = firebase.auth();
  const db = firebase.firestore();

  // ✅ Google Login
  function login() {
    const provider = new firebase.auth.GoogleAuthProvider();

    auth.signInWithPopup(provider)
      .then((result) => {
        const user = result.user;

        // Save user in Firestore
        db.collection("users").doc(user.uid).set({
          name: user.displayName || "No Name",
          email: user.email,
          uid: user.uid
        });

        showUser(user);
      })
      .catch((error) => {
        alert("Login Error: " + error.message);
      });
  }

  // 👤 Show User Info
  function showUser(user) {
    document.getElementById("userData").innerHTML = `
      <h2>Welcome ${user.displayName}</h2>
      <p>${user.email}</p>
      <button onclick="logout()">Logout</button>
    `;
  }

  // 🚪 Logout
  function logout() {
    auth.signOut().then(() => {
      location.reload();
    });
  }

  // 🔁 Auto Login Detect
  auth.onAuthStateChanged((user) => {
    if (user) {
      showUser(user);
    }
  });

} catch (e) {
  document.body.innerHTML = "<h2 style='color:red'>Error: " + e.message + "</h2>";
}
</script></body>
</html>
