<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Avenix Hub</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: linear-gradient(135deg, #6a11cb, #2575fc);
      color: white;
      text-align: center;
    }

    .header {
      display: flex;
      justify-content: space-between;
      padding: 20px;
      font-size: 20px;
      font-weight: bold;
    }

    .login-btn {
      background: #00ffa6;
      color: black;
      border: none;
      padding: 10px 18px;
      border-radius: 20px;
      cursor: pointer;
      font-weight: bold;
    }

    .box {
      margin-top: 60px;
      padding: 20px;
    }

    .card {
      background: rgba(255,255,255,0.1);
      padding: 20px;
      border-radius: 15px;
      margin: 20px;
    }
  </style>
</head>

<body>

<div class="header">
  ⚡ AVENIX HUB
  <button class="login-btn" onclick="googleLogin()">Google Login</button>
</div>

<div class="box">
  <h1>Welcome to Avenix Hub 🚀</h1>

  <div class="card">
    <h3>Avenix Panel</h3>
    <p>Best FF Utility Tool</p>
    <button class="login-btn">Download APK</button>
  </div>

  <div class="card">
    <h3>Testing Version ⚠️</h3>
    <button class="login-btn">Join Beta</button>
  </div>
</div>

<!-- 🔥 FIREBASE CODE -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, GoogleAuthProvider, signInWithPopup } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
import { getFirestore, doc, setDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyA-qXdBXHHZSIdf_462jQsP0n9GpDPIhJY",
  authDomain: "avenixhub.firebaseapp.com",
  projectId: "avenixhub",
  storageBucket: "avenixhub.firebasestorage.app",
  messagingSenderId: "475242197786",
  appId: "1:475242197786:web:9e590fc8a32c3c54e972a3",
  measurementId: "G-GTC6T2BZCP"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);
const provider = new GoogleAuthProvider();

window.googleLogin = async function () {
  try {
    const result = await signInWithPopup(auth, provider);
    const user = result.user;

    await setDoc(doc(db, "users", user.uid), {
      name: user.displayName,
      email: user.email,
      uid: user.uid
    });

    alert("Login Successful 🔥");
  } catch (error) {
    alert(error.message);
  }
};
</script>

</body>
</html>
